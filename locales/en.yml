about: "A curl-like Minecraft server status query tool."
long_about: "Auto-detects Java vs Bedrock edition; supports human-readable and JSON output."
hosts_help: "Target address(es), e.g. mc.hypixel.net or play.easecation.net:19132.\nWhen no port is given: Java fills in 25565, Bedrock fills in 19132."
java_help: "Force querying as Java Edition."
bedrock_help: "Force querying as Bedrock Edition."
latency_help: "Measure and show latency (Java does an extra ping/pong round trip)."
json_help: "Output as JSON (for jq and similar pipelines)."
max_time_help: "Maximum timeout (in seconds) for a single query."

